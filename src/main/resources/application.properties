
# Server Configuration
# Allow overriding via environment variable PORT; defaults to 8080
server.port=${PORT:8080}
spring.application.name=anonymous-voice-platform

# Spring DevTools Configuration
spring.devtools.restart.enabled=false

# Database Configuration (H2 - In-Memory for testing)
spring.datasource.url=jdbc:h2:mem:voice_platform_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.initialization-mode=always

# H2 Console (optional - access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# Database Configuration (PostgreSQL) - Uncomment when PostgreSQL is available
#spring.datasource.url=jdbc:postgresql://localhost:5432/voice_platform_db
#spring.datasource.username=postgres
#spring.datasource.password=postgres
#spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=YourSecretKeyForJWTTokenGenerationShouldBeAtLeast256BitsLongForHS256Algorithm
jwt.expiration=86400000
# Token expiration time in milliseconds (24 hours = 86400000 ms)

# WebRTC/WebSocket Configuration
spring.websocket.enabled=true

# Logging
logging.level.com.enterprise.voice=DEBUG
logging.level.org.springframework.security=DEBUG
