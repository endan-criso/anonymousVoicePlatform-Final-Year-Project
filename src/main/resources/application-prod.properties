# Production Configuration
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/voice_platform_db}
spring.datasource.username=${DB_USERNAME:voicelink_user}
spring.datasource.password=${DB_PASSWORD:changeme123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Security
spring.security.require-ssl=false

# WebSocket Configuration
spring.websocket.allowed-origins=${ALLOWED_ORIGINS:http://localhost:8080,https://your-domain.com}

# Logging
logging.level.root=INFO
logging.level.com.enterprise.voice=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# Actuator Endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Server Configuration
server.compression.enabled=true
server.http2.enabled=true
server.error.include-message=always
server.error.include-stacktrace=never

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
